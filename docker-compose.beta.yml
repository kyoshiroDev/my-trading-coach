services:
  api:
    build:
      context: .
      dockerfile: apps/api-mytradingcoach/Dockerfile
    image: mtc_api_beta:latest
    container_name: mtc_api_beta
    restart: unless-stopped
    env_file: .env.beta
    environment:
      - TZ=Europe/Paris
    networks:
      - mtc_network
    mem_limit: 1g
    memswap_limit: 1g
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-beta.rule=Host(`beta.api.mytradingcoach.app`)"
      - "traefik.http.routers.api-beta.entrypoints=websecure"
      - "traefik.http.routers.api-beta.tls.certresolver=letsencrypt"
      - "traefik.http.services.api-beta.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  mtc_network:
    external: true
