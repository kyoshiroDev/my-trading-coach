services:
  postgres:
    image: postgres:17-alpine
    container_name: mtc_postgres_local
    environment:
      POSTGRES_DB: mytradingcoach
      POSTGRES_USER: mtc_user
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtc_user -d mytradingcoach"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [mtc_local]

  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: mtc_pgbouncer_local
    environment:
      POOL_MODE: transaction
      PGBOUNCER_PORT: 5432
      DATABASES_HOST: mtc_postgres_local
      DATABASES_USER: mtc_user
      DATABASES_PASSWORD: devpassword
      DATABASES_PORT: 5432
      DEFAULT_POOL_SIZE: 25
      MAX_CLIENT_CONN: 200
      AUTH_TYPE: md5
      SERVER_IDLE_TIMEOUT: 600
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks: [mtc_local]

  redis:
    image: redis:7.4-alpine
    container_name: mtc_redis_local
    command: redis-server --requirepass devredispass --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks: [mtc_local]

  api:
    build:
      context: .
      dockerfile: apps/api-mytradingcoach/Dockerfile
    image: mtc_api_local:latest
    container_name: mtc_api_local
    env_file: .env.local
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks: [mtc_local]

volumes:
  postgres_local_data:

networks:
  mtc_local:
    driver: bridge