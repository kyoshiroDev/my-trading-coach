name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  NX_NO_CLOUD: true
  DATABASE_URL: postgresql://test:test@localhost:5432/test

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mytradingcoach_test
          POSTGRES_USER: mtc_user
          POSTGRES_PASSWORD: devpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7.4-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm exec prisma generate --config=./prisma/prisma.config.ts

      - name: Prisma migrate (test DB)
        run: pnpm exec prisma migrate deploy --config=./prisma/prisma.config.ts

      # ⚡ rapide
      - name: Lint (affected)
        run: pnpm nx affected -t lint --base=origin/main --head=HEAD

      # 🔒 SAFE (toujours build tout → artifacts garantis)
      - name: Build (all)
        run: pnpm nx run-many -t build --all

      # ⚡ rapide
      - name: Test (affected)
        run: pnpm nx affected -t test --base=origin/main --head=HEAD

      # 📦 Artifacts (toujours présents)
      - name: Upload Angular dist
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: dist/apps/app-mytradingcoach/
          if-no-files-found: error

      - name: Upload API dist
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: dist/apps/api-mytradingcoach/
          if-no-files-found: error

      - name: Upload Astro dist
        uses: actions/upload-artifact@v4
        with:
          name: astro-dist
          path: dist/apps/landing-mytradingcoach/
          if-no-files-found: error