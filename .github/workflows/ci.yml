name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm add -D @commitlint/cli @commitlint/config-conventional -w
      - run: pnpm dlx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile --prefer-offline

      - name: Lint Nx (safe)
        run: |
          pnpm nx affected --target=lint --base=origin/main --head=HEAD --parallel \
          || pnpm nx run-many --target=lint --all

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ github.ref }}
          restore-keys: nx-

      - name: Cache Angular
        uses: actions/cache@v4
        with:
          path: .angular/cache
          key: angular-${{ github.ref }}
          restore-keys: angular-

      - run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build Angular (safe)
        run: |
          pnpm nx affected --target=build --base=origin/main --head=HEAD \
          || pnpm nx build app-mytradingcoach --configuration=production

      - name: Build Astro (safe)
        run: |
          pnpm nx affected --target=build --base=origin/main --head=HEAD \
          || pnpm nx build landing-mytradingcoach

      - name: Upload Angular dist
        uses: actions/upload-artifact@v7
        with:
          name: angular-dist
          path: dist/apps/app-mytradingcoach/
          if-no-files-found: warn

      - name: Upload Astro dist
        uses: actions/upload-artifact@v7
        with:
          name: astro-dist
          path: apps/landing-mytradingcoach/dist/
          if-no-files-found: warn

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ github.ref }}
          restore-keys: nx-

      - run: pnpm install --frozen-lockfile --prefer-offline

      # ⚡ rapide
      - name: Tests affected
        run: |
          pnpm nx affected --target=test --base=origin/main --head=HEAD --parallel \
          || true

      # 🔒 sécurisé (TOUJOURS exécuté)
      - name: Tests Angular
        run: pnpm nx test app-mytradingcoach

      - name: Tests API
        run: pnpm nx test api-mytradingcoach

  # 🔥 VPS (inchangé)
  deploy-api-dev:
    name: Deploy API dev to VPS
    needs: [lint, build, test]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/apps/mytradingcoach/dev
            git pull origin dev
            docker compose --env-file .env.dev up -d --build api
            docker compose --env-file .env.dev run --rm api sh -c "npx prisma migrate deploy"

  deploy-angular-dev:
    name: Deploy Angular dev
    needs: [build]
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: angular-dist
          path: dist

      - run: npm install -g vercel

      - run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_APP_PROJECT_ID }}

  deploy-landing-dev:
    name: Deploy Landing dev
    needs: [build]
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: astro-dist
          path: dist

      - run: |
          mkdir -p .vercel/output/static
          cp -r dist/* .vercel/output/static/
          cp .vercel/output/static/index.html .vercel/output/index.html

          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

      - run: npm install -g vercel

      - run: vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_LANDING_PROJECT_ID }}