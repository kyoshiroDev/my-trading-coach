name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Commitlint (PRs uniquement) ───────────────────────────────────────────
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install commitlint
        run: npm install --save-dev @commitlint/cli @commitlint/config-conventional

      - name: Validate PR commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache npm store
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - name: Install dependencies
        run: npm ci

      - name: Lint Angular
        run: npx nx lint app-mytradingcoach

      - name: Lint NestJS
        run: npx nx lint api-mytradingcoach

      - name: Lint Landing
        run: npx nx lint landing-mytradingcoach || true

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    env:
      DATABASE_URL: postgresql://mtc_user:devpassword@localhost:5432/mytradingcoach_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: testpassword
      JWT_SECRET: test-jwt-secret-64-chars-minimum-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      JWT_REFRESH_SECRET: test-refresh-secret-64-chars-minimum-xxxxxxxxxxxxxxxxxxxxxxxxx
      ANTHROPIC_API_KEY: sk-ant-test

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mytradingcoach_test
          POSTGRES_USER: mtc_user
          POSTGRES_PASSWORD: devpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7.4-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache npm store
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - name: Cache Angular build
        uses: actions/cache@v4
        with:
          path: .angular/cache
          key: angular-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            angular-${{ github.ref }}-
            angular-

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate --schema=./prisma/schema.prisma

      - name: Prisma migrate (test DB)
        run: npx prisma migrate deploy --schema=./prisma/schema.prisma

      - name: Build NestJS
        run: npx nx build api-mytradingcoach

      - name: Build Angular
        run: NX_IGNORE_UNSUPPORTED_TS_SETUP=true npx nx build app-mytradingcoach --configuration=production

      - name: Build Astro landing
        run: npx nx build landing-mytradingcoach

      - name: Upload Angular dist
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: dist/apps/app-mytradingcoach/
          retention-days: 1

      - name: Upload Astro dist
        uses: actions/upload-artifact@v4
        with:
          name: astro-dist
          path: dist/apps/landing-mytradingcoach/
          retention-days: 1

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    env:
      DATABASE_URL: postgresql://mtc_user:devpassword@localhost:5432/mytradingcoach_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: testpassword
      JWT_SECRET: test-jwt-secret-64-chars-minimum-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      JWT_REFRESH_SECRET: test-refresh-secret-64-chars-minimum-xxxxxxxxxxxxxxxxxxxxxxxxx
      ANTHROPIC_API_KEY: sk-ant-test

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mytradingcoach_test
          POSTGRES_USER: mtc_user
          POSTGRES_PASSWORD: devpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7.4-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache npm store
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate --schema=./prisma/schema.prisma

      - name: Prisma migrate (test DB)
        run: npx prisma migrate deploy --schema=./prisma/schema.prisma

      - name: Test NestJS
        run: npx nx test api-mytradingcoach --passWithNoTests

      - name: Test Angular
        run: npx nx test app-mytradingcoach --passWithNoTests --watch=false
