name: CI

on:
  push:
    branches: [main, dev, ci-optimisation]
  pull_request:
    branches: [main, dev, ci-optimisation]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

  lint:
    runs-on: ubuntu-latest
    needs: setup
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
      NX_BRANCH: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: clean nx cache
        run: rm -rf .nx/cache

      - name: lint nx
        run: |
          pnpm nx affected --target=lint --base=origin/main --head=HEAD --parallel=3 \
          || pnpm nx run-many --target=lint --all --parallel=3

  build:
    runs-on: ubuntu-latest
    needs: setup
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
      NX_BRANCH: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: clean nx cache
        run: rm -rf .nx/cache

      - name: build nx
        run: |
          pnpm nx affected --target=build --base=origin/main --head=HEAD --parallel=3 \
          || pnpm nx run-many --target=build --all --parallel=3

      - name: upload angular
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: dist/apps/app-mytradingcoach/
          if-no-files-found: ignore

      - name: upload astro
        uses: actions/upload-artifact@v4
        with:
          name: astro-dist
          path: dist/apps/landing-mytradingcoach/
          if-no-files-found: ignore

  test-angular:
    runs-on: ubuntu-latest
    needs: build
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
      NX_BRANCH: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: clean nx cache
        run: rm -rf .nx/cache

      - name: test angular
        run: pnpm nx test app-mytradingcoach --parallel=2

  test-api:
    runs-on: ubuntu-latest
    needs: build
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
      NX_BRANCH: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: clean nx cache
        run: rm -rf .nx/cache

      - name: prisma generate
        run: pnpm exec prisma generate

      - name: test api
        run: pnpm nx test api-mytradingcoach --parallel=2

  deploy-api-dev:
    runs-on: ubuntu-latest
    needs: [test-angular, test-api]
    if: github.ref == 'refs/heads/dev'

    steps:
      - name: deploy vps
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/apps/mytradingcoach/dev
            git pull origin dev
            docker compose --env-file .env.dev up -d --build api
            docker compose --env-file .env.dev run --rm api sh -c "npx prisma migrate deploy"

  deploy-angular-dev:
    runs-on: ubuntu-latest
    needs: [test-angular, test-api]
    if: github.ref == 'refs/heads/dev'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: angular-dist
          path: dist

      - run: npm install -g vercel

      - run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_APP_PROJECT_ID }}

  deploy-landing-dev:
    runs-on: ubuntu-latest
    needs: [test-angular, test-api]
    if: github.ref == 'refs/heads/dev'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: astro-dist
          path: dist

      - run: |
          mkdir -p .vercel/output/static
          cp -r dist/* .vercel/output/static/
          cp .vercel/output/static/index.html .vercel/output/index.html

          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

      - run: npm install -g vercel

      - run: vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_LANDING_PROJECT_ID }}