name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Commitlint (PRs uniquement) ───────────────────────────────────────────
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install commitlint
        run: pnpm add -D @commitlint/cli @commitlint/config-conventional

      - name: Validate PR commits
        run: pnpm dlx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      NX_NO_CLOUD: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Angular
        run: pnpm nx lint app-mytradingcoach

      - name: Lint NestJS
        run: pnpm nx lint api-mytradingcoach

      - name: Lint Landing
        run: pnpm nx lint landing-mytradingcoach || true

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    env:
      NX_NO_CLOUD: true
      DATABASE_URL: postgresql://mtc_user:devpassword@localhost:5432/mytradingcoach_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: testpassword
      JWT_SECRET: test-jwt-secret-64-chars-minimum-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      JWT_REFRESH_SECRET: test-refresh-secret-64-chars-minimum-xxxxxxxxxxxxxxxxxxxxxxxxx
      ANTHROPIC_API_KEY: sk-ant-test

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mytradingcoach_test
          POSTGRES_USER: mtc_user
          POSTGRES_PASSWORD: devpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7.4-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Cache Angular build
        uses: actions/cache@v4
        with:
          path: .angular/cache
          key: angular-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            angular-${{ github.ref }}-
            angular-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm exec prisma generate --config=./prisma/prisma.config.ts

      - name: Prisma migrate (test DB)
        run: pnpm exec prisma migrate deploy --config=./prisma/prisma.config.ts

      - name: Build NestJS
        run: pnpm nx build api-mytradingcoach

      - name: Build Angular
        run: NX_IGNORE_UNSUPPORTED_TS_SETUP=true pnpm nx build app-mytradingcoach --configuration=production

      - name: Build Astro landing
        run: pnpm nx build landing-mytradingcoach

      - name: Upload Angular dist
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: dist/apps/app-mytradingcoach/
          retention-days: 1

      - name: Upload Astro dist
        uses: actions/upload-artifact@v4
        with:
          name: astro-dist
          path: apps/landing-mytradingcoach/dist/
          retention-days: 1

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    env:
      NX_NO_CLOUD: true
      DATABASE_URL: postgresql://mtc_user:devpassword@localhost:5432/mytradingcoach_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: testpassword
      JWT_SECRET: test-jwt-secret-64-chars-minimum-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      JWT_REFRESH_SECRET: test-refresh-secret-64-chars-minimum-xxxxxxxxxxxxxxxxxxxxxxxxx
      ANTHROPIC_API_KEY: sk-ant-test

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mytradingcoach_test
          POSTGRES_USER: mtc_user
          POSTGRES_PASSWORD: devpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7.4-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm exec prisma generate --config=./prisma/prisma.config.ts

      - name: Prisma migrate (test DB)
        run: pnpm exec prisma migrate deploy --config=./prisma/prisma.config.ts

      - name: Test NestJS
        run: pnpm nx test api-mytradingcoach

      - name: Test Angular
        run: pnpm nx test app-mytradingcoach
