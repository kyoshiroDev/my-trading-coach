name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Commitlint (PRs uniquement) ───────────────────────────────────────────
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate PR commits
        run: pnpm dlx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  # ── Lint (Nx Cloud affected) ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
      NX_BRANCH: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: lint nx affected
        run: |
          pnpm nx affected --target=lint --base=origin/main --head=HEAD --parallel=3 \
          || pnpm nx run-many --target=lint --all --parallel=3

  # ── Build (Nx Cloud affected) ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: lint
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
      NX_BRANCH: ${{ github.ref_name }}
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm exec prisma generate --config=./prisma/prisma.config.ts

      - name: build nx affected
        run: |
          pnpm nx affected --target=build --base=origin/main --head=HEAD --parallel=3 \
          || pnpm nx run-many --target=build --all --parallel=3

      - name: upload angular
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: dist/apps/app-mytradingcoach/
          if-no-files-found: ignore
          retention-days: 1

      - name: upload astro
        uses: actions/upload-artifact@v4
        with:
          name: astro-dist
          path: dist/apps/landing-mytradingcoach/
          if-no-files-found: ignore
          retention-days: 1

  # ── Tests Angular ─────────────────────────────────────────────────────────
  test-angular:
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
      NX_BRANCH: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: test angular
        run: pnpm nx test app-mytradingcoach --parallel=2

  # ── Tests API (NestJS + Prisma + services) ────────────────────────────────
  test-api:
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
      NX_BRANCH: ${{ github.ref_name }}
      DATABASE_URL: postgresql://mtc_user:devpassword@localhost:5432/mytradingcoach_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: testpassword
      JWT_SECRET: test-jwt-secret-64-chars-minimum-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      JWT_REFRESH_SECRET: test-refresh-secret-64-chars-minimum-xxxxxxxxxxxxxxxxxxxxxxxxx
      ANTHROPIC_API_KEY: sk-ant-test

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mytradingcoach_test
          POSTGRES_USER: mtc_user
          POSTGRES_PASSWORD: devpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7.4-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm exec prisma generate --config=./prisma/prisma.config.ts

      - name: Prisma migrate (test DB)
        run: pnpm exec prisma migrate deploy --config=./prisma/prisma.config.ts

      - name: test api
        run: pnpm nx test api-mytradingcoach --parallel=2

  # ── Deploy API dev → VPS ──────────────────────────────────────────────────
  deploy-api-dev:
    runs-on: ubuntu-latest
    needs: [test-angular, test-api]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: development
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/apps/mytradingcoach/dev
            git pull origin dev
            docker compose --env-file .env.dev build api
            docker compose --env-file .env.dev run --rm api sh -c "npx prisma migrate deploy"
            docker compose --env-file .env.dev up -d --build --force-recreate api
            echo "API dev deployment complete at $(date)"

  # ── Deploy Angular dev → Vercel ───────────────────────────────────────────
  deploy-angular-dev:
    runs-on: ubuntu-latest
    needs: [test-angular, test-api]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: development
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Angular (dev)
        run: NX_IGNORE_UNSUPPORTED_TS_SETUP=true pnpm nx build app-mytradingcoach --configuration=development
        env:
          API_URL: ${{ secrets.DEV_API_URL }}

      - name: Deploy to Vercel (dev)
        run: |
          pnpm dlx vercel \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --local-config ${{ github.workspace }}/apps/app-mytradingcoach/vercel.json
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_APP_PROJECT_ID }}

  # ── Tests E2E Playwright → dev deployed ──────────────────────────────────
  test-e2e:
    runs-on: ubuntu-latest
    needs: [deploy-angular-dev, deploy-api-dev]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: development
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BASE_URL: ${{ secrets.DEV_APP_URL }}
      E2E_FREE_EMAIL: ${{ secrets.E2E_FREE_EMAIL }}
      E2E_FREE_PASSWORD: ${{ secrets.E2E_FREE_PASSWORD }}
      E2E_PREMIUM_EMAIL: ${{ secrets.E2E_PREMIUM_EMAIL }}
      E2E_PREMIUM_PASSWORD: ${{ secrets.E2E_PREMIUM_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm nx e2e app-mytradingcoach-e2e --reporter=list
        env:
          BASE_URL: ${{ secrets.DEV_APP_URL }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Deploy Landing dev → Vercel ───────────────────────────────────────────
  deploy-landing-dev:
    runs-on: ubuntu-latest
    needs: [test-angular, test-api]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: development
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Astro landing (dev)
        run: pnpm nx build landing-mytradingcoach

      - name: Prepare Vercel output (prebuilt)
        run: |
          mkdir -p .vercel/output/static
          cp -r apps/landing-mytradingcoach/dist/* .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              {
                "src": "/_astro/(.*)",
                "headers": { "Cache-Control": "public, max-age=31536000, immutable" },
                "continue": true
              }
            ]
          }
          EOF

      - name: Deploy to Vercel (dev, prebuilt)
        run: pnpm dlx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_LANDING_PROJECT_ID }}
