name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Commitlint (PRs uniquement) ───────────────────────────────────────────
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate PR commits
        run: pnpm dlx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  # ── Lint (Nx Cloud affected) ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: lint nx affected
        run: |
          pnpm nx affected --target=lint --base=origin/main --head=HEAD --parallel=3 \
          || pnpm nx run-many --target=lint --all --parallel=3

  # ── Build (Nx Cloud affected) ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: lint
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm exec prisma generate --config=./prisma/prisma.config.ts

      - name: build nx affected
        run: |
          pnpm nx affected --target=build --base=origin/main --head=HEAD --parallel=3 \
          || pnpm nx run-many --target=build --all --parallel=3


  # ── Build & Check Astro Landing (toujours, pas affected) ─────────────────
  build-landing:
    name: Build Astro Landing
    runs-on: ubuntu-latest
    needs: lint
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Astro check (typecheck)
        run: pnpm nx lint landing-mytradingcoach

      - name: Astro build
        run: pnpm nx build landing-mytradingcoach

  # ── Tests Angular ─────────────────────────────────────────────────────────
  test-angular:
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: test angular
        run: pnpm nx test app-mytradingcoach --parallel=2

  # ── Tests API (NestJS + Prisma + services) ────────────────────────────────
  test-api:
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true
      DATABASE_URL: postgresql://mtc_user:devpassword@localhost:5432/mytradingcoach_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: testpassword
      JWT_SECRET: test-jwt-secret-64-chars-minimum-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      JWT_REFRESH_SECRET: test-refresh-secret-64-chars-minimum-xxxxxxxxxxxxxxxxxxxxxxxxx
      ANTHROPIC_API_KEY: sk-ant-test

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mytradingcoach_test
          POSTGRES_USER: mtc_user
          POSTGRES_PASSWORD: devpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7.4-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm exec prisma generate --config=./prisma/prisma.config.ts

      - name: Prisma migrate (test DB)
        run: pnpm exec prisma migrate deploy --config=./prisma/prisma.config.ts

      - name: test api
        run: pnpm nx test api-mytradingcoach --parallel=2

  # ── Deploy API dev → VPS (port 3001 via traefik) ──────────────────────────
  deploy-api-dev:
    name: Deploy API dev to VPS
    runs-on: ubuntu-latest
    needs: [test-angular, test-api]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true

    steps:
      - uses: actions/checkout@v4

      - name: Sync code to VPS (dev)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -az --delete
          path: apps/api-mytradingcoach/ libs/ prisma/ scripts/ docker-compose.dev.yml
          remote_path: /opt/apps/mytradingcoach/dev/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy via SSH (dev)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/apps/mytradingcoach/dev
            docker compose -f docker-compose.dev.yml --env-file .env.dev build api
            docker compose -f docker-compose.dev.yml --env-file .env.dev up -d --force-recreate api
            echo "Dev API deployment complete at $(date)"

  # ── Deploy Angular dev → Vercel (preview) ────────────────────────────────
  deploy-angular-dev:
    name: Deploy Angular dev to Vercel
    runs-on: ubuntu-latest
    needs: [test-angular, test-api]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Angular (dev)
        run: NX_IGNORE_UNSUPPORTED_TS_SETUP=true pnpm nx build app-mytradingcoach --configuration=development

      - name: Prepare Vercel output (prebuilt)
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/apps/app-mytradingcoach/browser/* .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              {
                "src": "/assets/(.*)",
                "headers": { "Cache-Control": "public, max-age=31536000, immutable" },
                "continue": true
              },
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

      - name: Deploy to Vercel (dev preview)
        run: pnpm dlx vercel@latest deploy --prebuilt --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_APP_PROJECT_ID }}

  # ── Deploy Landing dev → Vercel (preview) ────────────────────────────────
  deploy-landing-dev:
    name: Deploy Landing dev to Vercel
    runs-on: ubuntu-latest
    needs: [build-landing]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Astro landing (dev)
        run: pnpm nx build landing-mytradingcoach

      - name: Prepare Vercel output (prebuilt)
        run: |
          mkdir -p .vercel/output/static
          cp -r apps/landing-mytradingcoach/dist/* .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              {
                "src": "/_astro/(.*)",
                "headers": { "Cache-Control": "public, max-age=31536000, immutable" },
                "continue": true
              }
            ]
          }
          EOF

      - name: Deploy to Vercel (dev preview)
        run: pnpm dlx vercel@latest deploy --prebuilt --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_LANDING_PROJECT_ID }}

