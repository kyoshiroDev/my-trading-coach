name: CI

on:
  push:
    branches: [main, dev, feat/admin-app]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Commitlint (PRs uniquement) ───────────────────────────────────────────
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate PR commits
        run: pnpm dlx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  # ── Lint (Nx Cloud affected) ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: lint nx affected
        run: |
          pnpm nx affected --target=lint --base=origin/main --head=HEAD --parallel=3 \
          || pnpm nx run-many --target=lint --all --parallel=3

  # ── Build (Nx Cloud affected) ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: lint
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      DATABASE_DIRECT_URL: postgresql://dummy:dummy@localhost:5432/dummy

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm exec prisma generate --config=./prisma/prisma.config.ts

      - name: build nx affected
        run: |
          pnpm nx affected --target=build --base=origin/main --head=HEAD --parallel=3 \
          || pnpm nx run-many --target=build --all --parallel=3


  # ── Build & Check Astro Landing (toujours, pas affected) ─────────────────
  build-landing:
    name: Build Astro Landing
    runs-on: ubuntu-latest
    needs: lint
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Astro check (typecheck)
        run: pnpm nx lint landing-mytradingcoach

      - name: Astro build
        run: pnpm nx build landing-mytradingcoach

  # ── Tests Angular ─────────────────────────────────────────────────────────
  test-angular:
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: test angular
        run: pnpm nx test app-mytradingcoach --parallel=2

  # ── Tests API (NestJS + Prisma + services) ────────────────────────────────
  test-api:
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true
      DATABASE_URL: postgresql://mtc_user:devpassword@localhost:5432/mytradingcoach_test
      DATABASE_DIRECT_URL: postgresql://mtc_user:devpassword@localhost:5432/mytradingcoach_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: testpassword
      JWT_SECRET: test-jwt-secret-64-chars-minimum-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      JWT_REFRESH_SECRET: test-refresh-secret-64-chars-minimum-xxxxxxxxxxxxxxxxxxxxxxxxx
      ANTHROPIC_API_KEY: sk-ant-test

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mytradingcoach_test
          POSTGRES_USER: mtc_user
          POSTGRES_PASSWORD: devpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7.4-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm exec prisma generate --config=./prisma/prisma.config.ts

      - name: Prisma migrate (test DB)
        run: pnpm exec prisma migrate deploy --config=./prisma/prisma.config.ts

      - name: test api
        run: pnpm nx test api-mytradingcoach --parallel=2

  # ── Deploy API dev → VPS (port 3001 via traefik) ──────────────────────────
  deploy-api-dev:
    name: Deploy API dev to VPS
    runs-on: ubuntu-latest
    needs: [test-angular, test-api]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true

    steps:
      - name: Deploy via SSH (dev)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/apps/mytradingcoach/dev
            git fetch origin
            git reset --hard origin/dev
            docker compose -f docker-compose.dev.yml --env-file .env.dev build api
            docker compose -f docker-compose.dev.yml --env-file .env.dev up -d --force-recreate api
            docker buildx prune --keep-storage=8GB -f
            echo "Dev API deployment complete at $(date)"

  # ── Deploy Angular app dev → VPS static ──────────────────────────────────
  deploy-app-dev:
    name: Deploy Angular dev to VPS
    runs-on: ubuntu-latest
    needs: [test-angular, test-api]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Angular (dev)
        run: NX_IGNORE_UNSUPPORTED_TS_SETUP=true pnpm nx build app-mytradingcoach --configuration=development --skip-nx-cache

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: rsync Angular dev → VPS
        run: |
          rsync -az --delete dist/apps/app-mytradingcoach/browser/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/static/app-dev/

  # ── Deploy Astro landing dev → VPS static ────────────────────────────────
  deploy-landing-dev:
    name: Deploy Landing dev to VPS
    runs-on: ubuntu-latest
    needs: [build-landing]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Astro landing (dev)
        run: pnpm nx build landing-mytradingcoach

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: rsync Landing dev → VPS
        run: |
          rsync -az --delete apps/landing-mytradingcoach/dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/static/landing-dev/

  # ── Deploy Angular Admin → VPS static ───────────────────────────────────
  deploy-admin:
    name: Deploy Admin to VPS
    runs-on: ubuntu-latest
    needs: build
    if: (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/feat/admin-app') && github.event_name == 'push'
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Angular Admin
        run: NX_IGNORE_UNSUPPORTED_TS_SETUP=true pnpm nx build admin-mytradingcoach --configuration=production --skip-nx-cache

      - name: Verify build output
        run: |
          if [ ! -f "dist/apps/admin-mytradingcoach/browser/index.html" ]; then
            echo "❌ build failed — index.html not found"
            exit 1
          fi
          echo "✅ build ok — $(du -sh dist/apps/admin-mytradingcoach/browser/)"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: rsync Admin → VPS
        run: |
          rsync -az --delete dist/apps/admin-mytradingcoach/browser/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/static/admin/
