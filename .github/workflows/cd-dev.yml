name: CD — Deploy to Dev

on:
  push:
    branches: [dev]

env:
  NX_NO_CLOUD: true

jobs:
  # ── Deploy API dev → OVH VPS ──────────────────────────────────────────────
  deploy-api-dev:
    name: Deploy API dev to VPS
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/apps/mytradingcoach/dev
            git pull origin dev
            docker compose --env-file .env.dev build api
            docker compose --env-file .env.dev run --rm api sh -c "npx prisma migrate deploy"
            docker compose --env-file .env.dev up -d --no-deps api
            echo "API dev deployment complete at $(date)"