name: CD — Deploy to Production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NX_NO_CLOUD: true

jobs:
  # ── Deploy API → OVH VPS (Docker) ────────────────────────────────────────
  deploy-api:
    name: Deploy API to VPS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/mytradingcoach
            git pull origin main
            docker compose build api
            docker compose up -d --no-deps api
            echo "API deployment complete at $(date)"

  # ── Deploy Angular → Vercel ───────────────────────────────────────────────
  deploy-angular:
    name: Deploy Angular to Vercel
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Angular
        run: NX_IGNORE_UNSUPPORTED_TS_SETUP=true pnpm nx build app-mytradingcoach --configuration=production
        env:
          API_URL: ${{ secrets.API_URL }}

      - name: Deploy to Vercel
        run: |
          pnpm dlx vercel --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --cwd dist/apps/app-mytradingcoach/browser \
            --local-config ../../../../apps/app-mytradingcoach/vercel.json
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_APP_PROJECT_ID }}

  # ── Deploy Astro Landing → Vercel ─────────────────────────────────────────
  deploy-landing:
    name: Deploy Landing to Vercel
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Astro landing
        run: pnpm nx build landing-mytradingcoach

      - name: Deploy to Vercel
        run: |
          pnpm dlx vercel --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --cwd apps/landing-mytradingcoach
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_LANDING_PROJECT_ID }}
