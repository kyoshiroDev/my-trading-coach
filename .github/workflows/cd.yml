name: CD — Deploy to Production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  # ── API (VPS) ─────────────────────────────────────────
  deploy-api:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      - name: Deploy API via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/apps/mytradingcoach/prod
            git pull origin main
            docker compose --env-file .env.production build api
            docker compose --env-file .env.production run --rm api sh -c "npx prisma migrate deploy"
            docker compose --env-file .env.production up -d --force-recreate api

  # ── Angular (Vercel) ─────────────────────────────────
  deploy-angular:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: angular-dist
          path: dist/apps/app-mytradingcoach/

      - name: Deploy Angular (prebuilt)
        run: |
          npx vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --cwd dist/apps/app-mytradingcoach/browser
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_APP_PROJECT_ID }}

  # ── Landing Astro (Vercel) ───────────────────────────
  deploy-landing:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: astro-dist
          path: dist/apps/landing-mytradingcoach/

      - name: Prepare Vercel output
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/apps/landing-mytradingcoach/* .vercel/output/static/

      - name: Deploy Landing (prebuilt)
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_LANDING_PROJECT_ID }}