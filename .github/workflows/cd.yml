name: CD — Smart Deploy Production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: true

env:
  NX_NO_CLOUD: true

jobs:
  detect-changes:
    name: Detect affected apps
    runs-on: ubuntu-latest

    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    outputs:
      api: ${{ steps.set.outputs.api }}
      angular: ${{ steps.set.outputs.angular }}
      landing: ${{ steps.set.outputs.landing }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile

      - name: Detect affected projects
        id: affected
        run: |
          npx nx print-affected --base=origin/main~1 --head=HEAD --select=projects > affected.txt
          cat affected.txt

      - name: Set outputs
        id: set
        run: |
          if grep -q "api" affected.txt; then echo "api=true" >> $GITHUB_OUTPUT; else echo "api=false" >> $GITHUB_OUTPUT; fi
          if grep -q "app-mytradingcoach" affected.txt; then echo "angular=true" >> $GITHUB_OUTPUT; else echo "angular=false" >> $GITHUB_OUTPUT; fi
          if grep -q "landing-mytradingcoach" affected.txt; then echo "landing=true" >> $GITHUB_OUTPUT; else echo "landing=false" >> $GITHUB_OUTPUT; fi