name: CD — Deploy to Production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  # ── Détection des apps modifiées ──────────────────────────────────────────
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      angular: ${{ steps.diff.outputs.angular }}
      landing: ${{ steps.diff.outputs.landing }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 2
      - id: diff
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Files changed:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -q "^apps/app-mytradingcoach/"; then
            echo "angular=true" >> $GITHUB_OUTPUT
          else
            echo "angular=false" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -q "^apps/landing-mytradingcoach/"; then
            echo "landing=true" >> $GITHUB_OUTPUT
          else
            echo "landing=false" >> $GITHUB_OUTPUT
          fi

  # ── Deploy API → OVH VPS (Docker) ────────────────────────────────────────
  deploy-api:
    name: Deploy API to VPS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/apps/mytradingcoach/prod
            git fetch origin
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml --env-file .env.production build api
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --force-recreate api
            docker compose -f docker-compose.discord-bot.yml --env-file .env.production build discord-bot
            docker compose -f docker-compose.discord-bot.yml --env-file .env.production up -d --force-recreate discord-bot
            docker buildx prune --keep-storage=8GB -f
            echo "Production deployment complete at $(date)"

  # ── Deploy Angular → VPS static ──────────────────────────────────────────
  deploy-angular:
    name: Deploy Angular prod to VPS
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.angular == 'true' }}
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Angular
        run: NX_IGNORE_UNSUPPORTED_TS_SETUP=true pnpm nx build app-mytradingcoach --configuration=production --skip-nx-cache

      - name: Verify build output
        run: |
          if [ ! -f "dist/apps/app-mytradingcoach/browser/index.html" ]; then
            echo "❌ build failed — index.html not found"
            exit 1
          fi
          echo "✅ build ok — $(du -sh dist/apps/app-mytradingcoach/browser/)"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: rsync Angular prod → VPS
        run: |
          rsync -az --delete dist/apps/app-mytradingcoach/browser/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/static/app-prod/

  # ── Deploy Astro Landing → VPS static ────────────────────────────────────
  deploy-landing:
    name: Deploy Landing prod to VPS
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.landing == 'true' }}
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NX_NO_CLOUD: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Astro landing
        run: pnpm nx build landing-mytradingcoach

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: rsync Landing prod → VPS
        run: |
          rsync -az --delete apps/landing-mytradingcoach/dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/static/landing-prod/
