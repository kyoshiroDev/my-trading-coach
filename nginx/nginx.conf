events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Optimisations
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript text/xml
             application/xml application/xml+rss text/javascript application/wasm
             image/svg+xml;
  gzip_min_length 1000;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=ai:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

  # Upstream NestJS
  upstream nestjs_api {
    server api:3000;
    keepalive 32;
  }

  # Redirect HTTP → HTTPS
  server {
    listen 80;
    server_name mytradingcoach.app www.mytradingcoach.app app.mytradingcoach.app;
    return 301 https://$host$request_uri;
  }

  # Landing page — mytradingcoach.app (proxy Vercel ou statique local)
  server {
    listen 443 ssl;
    http2 on;
    server_name mytradingcoach.app www.mytradingcoach.app;

    ssl_certificate /etc/letsencrypt/live/mytradingcoach.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mytradingcoach.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Option A : proxy vers Vercel
    location / {
      proxy_pass https://mytradingcoach-landing.vercel.app;
      proxy_set_header Host mytradingcoach-landing.vercel.app;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Option B (si landing servi en local) : décommenter et commenter le bloc ci-dessus
    # root /var/www/landing;
    # location / { try_files $uri $uri/ /index.html; expires 1h; add_header Cache-Control "public, must-revalidate"; }
    # location ~* \.(js|css|woff2|webp|avif)$ { expires 1y; add_header Cache-Control "public, immutable"; }
  }

  # Application Angular — app.mytradingcoach.app
  server {
    listen 443 ssl;
    http2 on;
    server_name app.mytradingcoach.app;

    ssl_certificate /etc/letsencrypt/live/mytradingcoach.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mytradingcoach.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # SPA Angular — fichiers statiques
    root /usr/share/nginx/html/app;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
      expires 1h;
      add_header Cache-Control "public, must-revalidate";
    }

    # Assets avec hash Angular — cache immuable
    location ~* \.(js|css|woff2|webp|avif)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # Routes auth — rate limit strict
    location /api/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://nestjs_api;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Routes IA — rate limit + timeout long (Anthropic peut être lent)
    location /api/ai/ {
      limit_req zone=ai burst=3 nodelay;
      proxy_pass http://nestjs_api;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
      proxy_read_timeout 120s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Toutes les autres routes API
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://nestjs_api;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check public
    location /health {
      proxy_pass http://nestjs_api/api/health;
      access_log off;
    }
  }
}