services:

  nginx:
    image: nginx:1.27-alpine
    container_name: mtc_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/letsencrypt:ro
      - ./dist/apps/app-mytradingcoach/browser:/usr/share/nginx/html/app:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - mtc_network

  api:
    build:
      context: .
      dockerfile: apps/api-mytradingcoach/Dockerfile
    container_name: mtc_api
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://mtc_user:${POSTGRES_PASSWORD}@postgres:5432/mytradingcoach
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-https://app.mytradingcoach.app}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://app.mytradingcoach.app,https://mytradingcoach.app}
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mtc_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  postgres:
    image: postgres:17-alpine
    container_name: mtc_postgres
    environment:
      POSTGRES_DB: mytradingcoach
      POSTGRES_USER: mtc_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtc_user -d mytradingcoach"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mtc_network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  redis:
    image: redis:7.4-alpine
    container_name: mtc_redis
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - mtc_network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  mtc_network:
    driver: bridge