services:
  postgres:
    image: postgres:17-alpine
    container_name: mtc_postgres_local
    environment:
      TZ: Europe/Paris
      POSTGRES_DB: mytradingcoach
      POSTGRES_USER: mtc_user
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtc_user -d mytradingcoach"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [mtc_local]

  redis:
    image: redis:7.4-alpine
    container_name: mtc_redis_local
    command: redis-server --requirepass devredispass --maxmemory 128mb --maxmemory-policy noeviction
    environment:
      - TZ=Europe/Paris
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks: [mtc_local]

  discord-bot:
    build:
      context: scripts/discord-bot
      dockerfile: Dockerfile
    container_name: mtc_discord_bot_local
    environment:
      - TZ=Europe/Paris
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_ROLE_MEMBRE_ID=${DISCORD_ROLE_MEMBRE_ID}
      - DISCORD_ROLE_PREMIUM_ID=${DISCORD_ROLE_PREMIUM_ID}
      - DISCORD_BOT_SECRET=${DISCORD_BOT_SECRET}
      - API_URL=http://host.docker.internal:3000
    restart: unless-stopped
    mem_limit: 128m
    memswap_limit: 128m
    networks: [mtc_local]

volumes:
  postgres_local_data:

networks:
  mtc_local:
    driver: bridge